name: Generate 3D Metropolis Twitch-Neon Skyscrapers

on:
  schedule:
    - cron: "0 18 * * *"     # Daily at 6 PM UTC
  workflow_dispatch:         # Allows manual run

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Generate 3D Contribution Graph
        uses: yoshi389111/github-profile-3d-contrib@latest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}     # Built-in token, no need to create one
          USERNAME: TSMCIDevTest                        # ← CHANGE THIS TO YOUR EXACT GITHUB USERNAME

      - name: Commit & Push 3D Skyscraper Graph
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A .
          if git diff --staged --quiet; then
            echo "No changes detected"
          else
            git commit -m "Update 3D Neon Metropolis skyscraper contribution graph 🌃🎮"
            git push
          fi
