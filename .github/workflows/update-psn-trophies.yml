name: Update PSN from PSNProfiles

on:
  schedule:
    - cron: "*/30 * * * *"     # Every 30 minutes (you can change to */15 if you want)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run PSNProfiles Scraper
        run: python .github/scripts/update_psn_from_psnprofiles.py

      - name: Commit & Push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update PSN data from PSNProfiles"
            git push
          fi
