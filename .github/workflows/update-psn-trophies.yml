name: Update PSN Trophies + Platinums + Twitch Feed

on:
  schedule:
    - cron: "0 3 * * *"     # Runs daily at 3 AM UTC
  workflow_dispatch:        # Allows you to run it manually

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psnawp requests

      - name: Run PSN + Twitch Update Script
        run: python .github/scripts/update_psn_advanced.py
        env:
          NPSSO: ${{ secrets.NPSSO }}

      - name: Commit & Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update PSN trophies, recent platinums, live feed & PS Plus status"
            git push
          fi
