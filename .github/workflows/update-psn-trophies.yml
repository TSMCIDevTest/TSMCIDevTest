name: Update PSN Status

on:
  schedule:
    # This runs every hour. You can change this to '*/15 * * * *' for every 15 mins.
    - cron: '0 * * * *'
  workflow_dispatch: # Allows you to run it manually

jobs:
  update-svg:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Download latest PSN SVG
        run: |
          curl -o psn-status.svg "https://gaming-stuff.vercel.app/api/profile?user=Banerlc&format=svg"

      - name: Commit and Push if changed
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add psn-status.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update PSN Status Card" && git push)
